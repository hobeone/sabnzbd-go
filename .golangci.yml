version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - gosec
    - nilerr
    - prealloc
    - revive
    - wastedassign
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
    revive:
      rules:
        - name: exported
          disabled: false
        - name: package-comments
          disabled: false
        - name: var-naming
        - name: unused-parameter
          disabled: true
    gosec:
      excludes:
        - G104  # handled by errcheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hobeone/sabnzbd-go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
