# Sample sabnzbd-go configuration covering every section the loader
# understands. Used by TestRoundTripFixture to ensure the on-disk schema
# stays stable.
general:
  host: 127.0.0.1
  port: 4289
  https_port: 0
  https_cert: ""
  https_key: ""
  api_key: 0123456789abcdef
  nzb_key: fedcba9876543210
  username: admin
  password: ""
  download_dir: ~/downloads/incomplete
  complete_dir: ~/downloads/complete
  dirscan_dir: ~/downloads/watch
  dirscan_speed: 5
  script_dir: scripts
  email_dir: ""
  log_dir: logs
  admin_dir: admin
  language: en

downloads:
  bandwidth_max: 50M
  bandwidth_perc: 100
  min_free_space: 1024M
  min_free_space_cleanup: 2048M
  article_cache_size: 500M
  max_art_tries: 3
  max_art_opt: 1
  top_only: false
  no_penalties: false
  pre_check: false
  propagation_delay: 0

postproc:
  enable_unrar: true
  enable_7zip: true
  direct_unpack: false
  enable_par_cleanup: true
  par2_command: par2
  unrar_command: ""
  sevenz_command: ""
  par2_turbo: false
  ignore_unrar_dates: false
  overwrite_files: false
  flat_unpack: false

servers:
  - name: primary
    displayname: My Primary Server
    host: news.example.com
    port: 563
    username: user
    password: secret
    connections: 8
    ssl: true
    ssl_verify: 2
    ssl_ciphers: ""
    priority: 0
    required: true
    optional: false
    retention: 0
    timeout: 60
    pipelining_requests: 2
    enable: true
  - name: backup
    displayname: Backup Server
    host: backup.example.com
    port: 563
    username: user2
    password: secret2
    connections: 4
    ssl: true
    ssl_verify: 2
    ssl_ciphers: ""
    priority: 1
    required: false
    optional: true
    retention: 1500
    timeout: 60
    pipelining_requests: 2
    enable: true

categories:
  - name: Default
    pp: 3
    script: None
    priority: 0
    dir: ""
    order: 0
  - name: "*"
    pp: 3
    script: None
    priority: 0
    dir: ""
    order: 1
  - name: tv
    pp: 3
    script: None
    priority: 0
    dir: TV
    order: 2

sorters:
  - name: tv-sorter
    order: 0
    min_size: 0
    multipart_label: ""
    sort_string: "%t/Season %s/%t - s%0sxe%0e - %en"
    sort_cats:
      - tv
    sort_type:
      - 1
    is_active: true

schedules:
  - name: nightly-resume
    enabled: true
    action: resume
    arguments: ""
    minute: "0"
    hour: "1"
    dayofweek: "*"

rss:
  - name: example-feed
    uri: https://example.com/rss
    cat: tv
    pp: ""
    script: ""
    enable: true
    priority: 0
    filters:
      - name: tv-only
        enabled: true
        title: "(?i)s\\d+e\\d+"
        body: ""
        cat: tv
        pp: ""
        script: ""
        priority: 0
        type: require
        size_from: 100M
        size_to: 5G
        age: 7
